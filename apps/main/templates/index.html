{% extends 'base.html' %}

{% load martortags %}

{% block content %}
<div class="box">
  <h1 class="title is-1">Welcome on Django Bike</h1>
</div>

{% for note in release_notes %}
<article class="box">
  <h2 class="title is-2">{{ note.get_version_type_display }} {{ note.version_number }}</h2>
  <h2 class="subtitle">{{ note.version_date }}</h2>

  <hr/>

  {{ note.description|safe_markdown }}
</article>
{% endfor %}
{% endblock content %}
